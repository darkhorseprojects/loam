name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-linux
            asset_os: linux
            asset_arch: x86_64
            archive: tar.gz
            exe_suffix: ''
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-linux
            asset_os: linux
            asset_arch: aarch64
            archive: tar.gz
            exe_suffix: ''
          - label: macos-aarch64
            os: macos-14
            target: aarch64-macos
            asset_os: macos
            asset_arch: aarch64
            archive: tar.gz
            exe_suffix: ''
          - label: macos-x86_64
            os: macos-14
            target: x86_64-macos
            asset_os: macos
            asset_arch: x86_64
            archive: tar.gz
            exe_suffix: ''
          - label: windows-x86_64
            os: ubuntu-latest
            target: x86_64-windows
            asset_os: windows
            asset_arch: x86_64
            archive: zip
            exe_suffix: '.exe'

    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="loam-${version}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.${{ matrix.archive }}"
          rm -rf dist
          mkdir -p "dist/loam"
          cp "zig-out/bin/loam${{ matrix.exe_suffix }}" "dist/loam/loam${{ matrix.exe_suffix }}"
          cp "zig-out/bin/loam-mcp${{ matrix.exe_suffix }}" "dist/loam/loam-mcp${{ matrix.exe_suffix }}"
          cp -R brushes "dist/loam/brushes"
          cp README.md LICENSE "dist/loam/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist/loam && python3 -m zipfile -c "../${asset}" .)
          else
            tar -czf "dist/${asset}" -C dist/loam .
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
        id: package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: dist/${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: loam-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_notes: true
          files: dist/*
